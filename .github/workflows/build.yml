name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build APK with Buildozer
        run: |
          rm -rf .buildozer
          buildozer android debug
          
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade Cython==0.29.33 virtualenv
          pip install buildozer

      - name: Build APK with Buildozer
        run: |
          # Only clean if the directory exists to avoid the FileNotFoundError
          if [ -d ".buildozer" ]; then buildozer android clean; fi
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FallGuardian-APK
          path: bin/*.apk